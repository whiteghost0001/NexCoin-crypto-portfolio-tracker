version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: crypto-portfolio-db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: crypto-portfolio

  server:
    build: ./server
    container_name: crypto-portfolio-server
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/crypto-portfolio
      - JWT_SECRET=change-this-secret-in-production
      - PORT=5000
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build: ./client
    container_name: crypto-portfolio-client
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - server
    environment:
      - REACT_APP_API_URL=http://localhost:5000

volumes:
  mongodb_data:
